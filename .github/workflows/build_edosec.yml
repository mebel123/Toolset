name: Build container
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy Environment: [prod]'
        required: true
        default: 'prod'

jobs:
  build:
    environment:
      name: ${{ github.event.inputs.environment || 'prod' }}
    env:
      repository: ${{ secrets.EDOSEC_REPO }}
      sshkey: ${{ secrets.SSH_KEY }}
      sshpwd: ${{ secrets.SSH_PWD }}
      KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
      BUILD_NUMBER: ${{ github.run_number }}
    name: Build image
    runs-on: [ self-hosted ]
    steps:
      - name: prepare hello world
        continue-on-error: true
        run: |
          rm -rf edosec
      - uses: cardoe/ssh-agent-deploy-key@v1
        with:
          # SSH private keys to load into the ssh-agent
          ssh-private-key: |
            ${{secrets.SSH_KEY}}
          ssh-known-hosts: |
            ${{secrets.KNOWN_HOSTS}}
      - name: checkout source code of client
        run: |
          git clone $repository
      
