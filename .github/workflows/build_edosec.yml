name: Build edoSec Containers

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: "prod"
      image_tag:
        description: "Docker tag for all built images"
        required: true
        default: "0.1"

jobs:
  build-and-push:
    name: Build and push all runtime containers
    runs-on: [self-hosted]
    environment:
      name: ${{ github.event.inputs.environment || 'prod' }}
    env:
      REPOSITORY: ${{ secrets.EDOSEC_REPO }}
      KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS_EDOLOGIC }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || '0.1' }}
      REGISTRY_PREFIX: registry.edologic.de/edosec

    steps:
      - name: Prepare workspace
        run: rm -rf edosec

      - name: Load SSH deploy key
        uses: cardoe/ssh-agent-deploy-key@v1
        with:
          ssh-private-key: |
            ${{ secrets.SSH_KEY_EDOLOGIC }}
          ssh-known-hosts: |
            ${{ secrets.KNOWN_HOSTS_EDOLOGIC }}

      - name: Clone repository
        run: |
          set -euo pipefail
          git clone "$REPOSITORY"

      - name: Show build metadata
        run: |
          set -euo pipefail
          cd edosec
          echo "environment=${{ github.event.inputs.environment || 'prod' }}"
          echo "image_tag=${IMAGE_TAG}"
          echo "commit=$(git rev-parse HEAD)"

      - name: Build and push frontend
        run: |
          set -euo pipefail
          cd edosec/frontend/edosec
          docker build \
            -t "${REGISTRY_PREFIX}/voice-frontend:${IMAGE_TAG}" \
            .
          docker push "${REGISTRY_PREFIX}/voice-frontend:${IMAGE_TAG}"

      - name: Build and push api-server
        run: |
          set -euo pipefail
          cd edosec/go-agent
          docker build \
            -f Dockerfile.api \
            -t "${REGISTRY_PREFIX}/voice-api-server:${IMAGE_TAG}" \
            .
          docker push "${REGISTRY_PREFIX}/voice-api-server:${IMAGE_TAG}"

      - name: Build and push voice-agent
        run: |
          set -euo pipefail
          cd edosec/go-agent
          docker build \
            -f Dockerfile.agent \
            -t "${REGISTRY_PREFIX}/voice-agent:${IMAGE_TAG}" \
            .
          docker push "${REGISTRY_PREFIX}/voice-agent:${IMAGE_TAG}"

      - name: Build and push runner-agent
        run: |
          set -euo pipefail
          cd edosec/go-agent
          docker build \
            -f Dockerfile.runner \
            -t "${REGISTRY_PREFIX}/runner-agent:${IMAGE_TAG}" \
            .
          docker push "${REGISTRY_PREFIX}/runner-agent:${IMAGE_TAG}"

      - name: Build and push db-migrate
        run: |
          set -euo pipefail
          cd edosec/go-agent
          docker build \
            -f Dockerfile.migration \
            -t "${REGISTRY_PREFIX}/db-migrate:${IMAGE_TAG}" \
            .
          docker push "${REGISTRY_PREFIX}/db-migrate:${IMAGE_TAG}"
